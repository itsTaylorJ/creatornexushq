<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="22%" r="55%">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="82%" r="55%">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#07070f"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- logo mark -->
  <rect x="90" y="96" width="88" height="88" rx="22" fill="url(#fav)"/>
  <text x="134" y="146" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">N</text>
  <text x="200" y="146" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#eeeeff" dominant-baseline="central">CreatorNexusHQ</text>

  <!-- headline -->
  <text x="90" y="330" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="800" fill="#ffffff">Stop Guessing.</text>
  <text x="90" y="440" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="800" fill="url(#wm)">Start Growing.</text>

  <!-- subline -->
  <text x="92" y="520" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400" fill="#8a8ac0">The all-in-one AI growth platform for content creators.</text>

  <!-- platform row -->
  <text x="92" y="578" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#5a5a90">YouTube · Twitch · TikTok · Kick · Instagram · Rumble · Facebook</text>
</svg>
